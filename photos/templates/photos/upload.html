{% extends "base.html" %}

{% block title %}Upload Photo{% endblock %}

{% block content %}
    <h2 class="text-center mb-4">Upload New Photo</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">Upload</button>
            <a href="{% url 'photo_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
{% endblock %}
